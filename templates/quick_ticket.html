<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Box Office | AADU ADMIN</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">

    <nav class="navbar bg-white border-bottom shadow-sm mb-4 py-3 sticky-top">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <span class="fw-bold fs-5 text-dark">
                <i class="fa-solid fa-bolt text-warning me-2"></i>AADU <span class="text-primary">BOX OFFICE</span>
            </span>
            <div class="d-flex align-items-center gap-3">
                <a href="/admin" class="btn btn-outline-secondary btn-sm fw-bold rounded-pill px-4">
                    <i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-4 mb-5">
        <div class="row g-4">
            
            <div class="col-lg-4">
                <div class="glass-panel h-100 position-sticky" style="top: 100px;">
                    <h5 class="fw-bold mb-4 border-bottom pb-3"><i class="fa-solid fa-user-pen text-primary me-2"></i>Walk-in Details</h5>
                    
                    <div class="mb-3">
                        <label class="form-label small text-muted fw-bold">CUSTOMER NAME (Optional)</label>
                        <input type="text" id="manualName" class="form-control" placeholder="e.g., Walk-in Guest">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small text-muted fw-bold">PHONE (Optional)</label>
                        <input type="tel" id="manualPhone" class="form-control" placeholder="e.g., 9876543210" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-muted fw-bold">CASH COLLECTED (₹)</label>
                        <input type="number" id="manualPrice" class="form-control fw-bold text-success fs-5" value="200" required>
                    </div>

                    <div class="mt-4 p-3 bg-light border rounded text-center">
                        <span class="small text-muted fw-bold d-block mb-1">SELECTED SEAT</span>
                        <h2 class="fw-bold text-primary m-0" id="displaySeat">--</h2>
                    </div>

                    <button id="issueTicketBtn" class="btn btn-success w-100 py-3 mt-4 fw-bold shadow-sm" disabled onclick="issueManualTicket()">
                        <i class="fa-solid fa-print me-2"></i>ISSUE TICKET NOW
                    </button>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="glass-panel">
                    <h5 class="fw-bold mb-4 border-bottom pb-3 text-center">Select Available Seat</h5>
                    
                    <div class="seat-map-container bg-white border-0 p-0 mt-0 shadow-none">
                        <div class="screen-area mt-2 mb-5"></div>
                        <div id="adminSeatGrid" class="text-center">
                            </div>
                    </div>

                    <div class="d-flex justify-content-center gap-4 mt-5 flex-wrap small fw-bold text-muted border-top pt-4">
                        <div class="d-flex align-items-center"><div class="seat available me-2" style="width:16px;height:16px;margin:0;"></div> Available</div>
                        <div class="d-flex align-items-center"><div class="seat selected me-2" style="width:16px;height:16px;margin:0;"></div> Selected</div>
                        <div class="d-flex align-items-center"><div class="seat unavailable me-2" style="width:16px;height:16px;margin:0;"></div> Booked</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let selectedSeatId = null;

        // 1. Load seats and block occupied ones
        async function loadAdminSeats() {
            const grid = document.getElementById('adminSeatGrid');
            grid.innerHTML = '<div class="spinner-border text-primary py-4"></div>';

            try {
                const res = await fetch('/get-occupied-seats');
                const data = await res.json();
                const occupied = data.occupied_seats || [];
                grid.innerHTML = '';

                const rows = ['A', 'B', 'C', 'D'];
                rows.forEach(rowLetter => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'seat-grid-row';
                    
                    for (let i = 1; i <= 10; i++) {
                        const seatId = `${rowLetter}${i}`;
                        const isTaken = occupied.includes(seatId);
                        
                        const seatEl = document.createElement('div');
                        seatEl.className = `seat ${isTaken ? 'unavailable' : 'available'}`;
                        seatEl.innerText = seatId;

                        if (!isTaken) {
                            seatEl.onclick = () => {
                                // FIX: Seat Deselection Logic
                                if (seatEl.classList.contains('selected')) {
                                    // If clicked again, deselect it
                                    seatEl.classList.remove('selected');
                                    selectedSeatId = null;
                                    document.getElementById('displaySeat').innerText = '--';
                                    document.getElementById('issueTicketBtn').disabled = true;
                                } else {
                                    // Deselect any previously selected seat
                                    document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
                                    // Select this new one
                                    seatEl.classList.add('selected');
                                    selectedSeatId = seatId;
                                    document.getElementById('displaySeat').innerText = seatId;
                                    document.getElementById('issueTicketBtn').disabled = false;
                                }
                            };
                        }
                        rowDiv.appendChild(seatEl);
                    }
                    grid.appendChild(rowDiv);
                });
            } catch (err) {
                grid.innerHTML = '<div class="text-danger py-4">Error loading seat map. Check connection.</div>';
            }
        }

        // 2. Issue the manual ticket bypassing upload
        async function issueManualTicket() {
            if (!selectedSeatId) {
                alert("Please select a seat first.");
                return;
            }
            
            const btn = document.getElementById('issueTicketBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';
            btn.disabled = true;

            // Gather walk-in data
            const payload = {
                name: document.getElementById('manualName').value.trim() || "Walk-in Guest",
                phone: document.getElementById('manualPhone').value.trim() || "N/A",
                price: document.getElementById('manualPrice').value || 200,
                seat_id: selectedSeatId
            };

            try {
                const res = await fetch('/admin/create-manual-booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert(`Success! Ticket for Seat ${selectedSeatId} has been issued and saved to the database.`);
                    // Send them back to the dashboard so they can see the new row and use WhatsApp
                    window.location.href = '/admin'; 
                } else {
                    const data = await res.json();
                    alert("Error: " + (data.error || "Seat may have just been booked online."));
                    btn.innerHTML = originalText;
                    loadAdminSeats(); // Reload map to show it's taken
                }
            } catch (err) {
                alert("Network error. Could not reach server.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Initialize map on load
        loadAdminSeats();
    </script>
</body>
</html>
