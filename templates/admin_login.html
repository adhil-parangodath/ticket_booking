<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | AADU ADMIN</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    
    <style>
        /* Centered layout specifically for the login screen */
        body {
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 40px 30px;
        }

        .brand-icon {
            width: 65px;
            height: 65px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin: 0 auto 20px;
        }
        
        .input-group-text {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-right: none;
            color: var(--text-muted);
        }
        
        .form-control.login-input {
            border-left: none;
            padding-left: 0;
        }
        
        .form-control.login-input:focus {
            box-shadow: none;
            border-color: var(--border-color);
        }
        
        .input-group:focus-within {
            box-shadow: 0 0 0 4px var(--primary-light);
            border-radius: 8px;
        }
        
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card text-center">
            
            <div class="brand-icon">
                <i class="fa-solid fa-lock"></i>
            </div>
            
            <h4 class="fw-bold mb-1">Admin Portal</h4>
            <p class="text-muted small mb-4">Enter your credentials to manage bookings.</p>

            {% if error %}
            <div class="alert alert-danger py-2 small fw-bold text-start mb-4 border-0" style="background-color: #fee2e2; color: #991b1b;">
                <i class="fa-solid fa-circle-exclamation me-2"></i> {{ error }}
            </div>
            {% endif %}

            <form action="/admin/login" method="POST" class="text-start">
                
                <div class="mb-3">
                    <label class="form-label small text-muted fw-bold">USERNAME</label>
                    <div class="input-group rounded-3 overflow-hidden">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="text" name="username" class="form-control login-input" placeholder="admin" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-muted fw-bold">PASSWORD</label>
                    <div class="input-group rounded-3 overflow-hidden">
                        <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                        <input type="password" name="password" class="form-control login-input" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                    Access Dashboard <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                </button>
            </form>
            
        </div>
        
        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none small text-muted fw-bold hover-primary">
                <i class="fa-solid fa-house me-1"></i> Return to Main Website
            </a>
        </div>
    </div>

</body>
</html>
